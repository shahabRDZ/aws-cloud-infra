# =============================================================================
# nginx.conf — Production Nginx configuration
#
# Architecture:
#   - Nginx terminates HTTP connections from the ALB (TLS already terminated)
#   - Proxies /api/* and /* to the application container
#   - Serves /static/* directly from the local filesystem (or S3 mount)
#   - Returns /health without proxying (no upstream dependency for health checks)
#
# Tuning notes:
#   - worker_processes auto: one worker per CPU core
#   - keepalive 32: reuse upstream connections to reduce TCP handshake overhead
#   - gzip on: compress text responses > 1KB (typical ~70% size reduction)
# =============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65536;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format with request ID (set by ALB) for distributed tracing
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time '
                    'req_id=$http_x_amzn_trace_id';

    access_log  /var/log/nginx/access.log  main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 4096;

    # Security — hide Nginx version in Server header
    server_tokens  off;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Client limits — protect against slow-loris and large request attacks
    client_max_body_size        10m;
    client_body_timeout         12s;
    client_header_timeout       12s;
    send_timeout                10s;
    keepalive_requests          1000;

    # Rate limiting zones — keyed by client IP
    limit_req_zone  $binary_remote_addr  zone=api:10m     rate=100r/s;
    limit_req_zone  $binary_remote_addr  zone=general:10m rate=200r/s;
    limit_conn_zone $binary_remote_addr  zone=addr:10m;

    # Upstream: application container
    upstream app_backend {
        server  app:8080;
        keepalive 32;                   # Pool of persistent connections to the app
        keepalive_requests  1000;
        keepalive_timeout   60s;
    }

    # -------------------------------------------------------------------------
    # Server block
    # -------------------------------------------------------------------------
    server {
        listen       80;
        server_name  _;

        # Security headers
        add_header X-Frame-Options           "SAMEORIGIN"           always;
        add_header X-Content-Type-Options    "nosniff"              always;
        add_header X-XSS-Protection          "1; mode=block"        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Connection limits per IP
        limit_conn addr 100;

        # -----------------------------------------------------------------------
        # Health check — answered by Nginx directly without proxying to app.
        # ALB targets this endpoint; must return 200 quickly.
        # -----------------------------------------------------------------------
        location = /health {
            access_log  off;
            add_header  Content-Type text/plain;
            return      200 "ok\n";
        }

        location = /nginx-status {
            stub_status;
            access_log  off;
            # Restrict to VPC CIDR only
            allow       10.0.0.0/8;
            deny        all;
        }

        # -----------------------------------------------------------------------
        # Static assets — served directly with long cache TTL.
        # Files are uploaded to this path from the build pipeline.
        # -----------------------------------------------------------------------
        location /static/ {
            alias       /app/static/;
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;

            # Fallback to index for SPA routing
            try_files   $uri $uri/ =404;
        }

        location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|eot)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
            log_not_found off;
        }

        # -----------------------------------------------------------------------
        # API routes — rate limited, proxied to app backend
        # -----------------------------------------------------------------------
        location /api/ {
            limit_req  zone=api  burst=50  nodelay;

            proxy_pass          http://app_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection         "";
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_set_header    X-Request-ID       $http_x_amzn_trace_id;

            proxy_connect_timeout   5s;
            proxy_read_timeout      60s;
            proxy_send_timeout      60s;

            proxy_buffer_size       8k;
            proxy_buffers           8 32k;
            proxy_busy_buffers_size 64k;

            # Do not cache API responses
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # -----------------------------------------------------------------------
        # All other routes — proxied to application backend
        # -----------------------------------------------------------------------
        location / {
            limit_req  zone=general  burst=100  nodelay;

            proxy_pass          http://app_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection         "";
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_set_header    X-Request-ID       $http_x_amzn_trace_id;

            proxy_connect_timeout   5s;
            proxy_read_timeout      30s;
            proxy_send_timeout      30s;
        }

        # -----------------------------------------------------------------------
        # Error pages
        # -----------------------------------------------------------------------
        error_page  404              /404.html;
        error_page  500 502 503 504  /50x.html;

        location = /50x.html {
            root  /usr/share/nginx/html;
        }
    }
}
